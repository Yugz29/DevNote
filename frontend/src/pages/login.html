<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevNote - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/reset.css">
    <link rel="stylesheet" href="/src/styles/variables.css">
    <link rel="stylesheet" href="/src/styles/light.css">
    <link rel="stylesheet" href="/src/styles/main.css">
    <link rel="stylesheet" href="/src/styles/auth.css">
    <!-- Apply saved theme before render to avoid flash -->
    <script>
      (function() {
        const t = localStorage.getItem('devnote-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
</head>
<body class="auth-page">

    <div class="auth-container">

        <!-- Brand -->
        <div class="auth-brand">
            <a href="/src/pages/index.html" class="auth-title" style="text-decoration:none">Dev<span style="color:var(--accent-primary)">Note</span></a>
            <p class="auth-subtitle">Your dev knowledge, everywhere, instantly</p>
        </div>

        <!-- Card -->
        <div class="auth-card">
            <h2 class="auth-card-title">Connexion</h2>

            <form id="login-form" class="auth-form" novalidate>

                <div class="form-field">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="email@example.com"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-field">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <p id="error-message" class="auth-error"></p>

                <button type="submit" id="submit-btn" class="btn-auth">
                    Connexion
                </button>

            </form>
        </div>

        <!-- Footer -->
        <p class="auth-footer">
            Don't have an account? <a href="/src/pages/register.html">Sign up</a>
        </p>

    </div>

    <script src="/src/utils/theme-toggle.js"></script>
    <script type="module" src="/src/pages/login.js"></script>
</body>
</html>
